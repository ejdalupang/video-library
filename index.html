<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Library</title>
<link rel="stylesheet" href="style.css?v=1">
</head>
<body>

<header class="topbar">
  <h1>🎬 Video Library</h1>
  <button id="themeToggle" class="icon-btn" title="Toggle dark mode">🌙</button>
</header>

<section class="add-form">
  <input id="urlInput" type="url" placeholder="Paste Instagram or TikTok link…" autocomplete="off">
  <input id="categoryInput" type="text" placeholder="Category (e.g. Recipes, Travel)" list="categoryList" autocomplete="off">
  <datalist id="categoryList"></datalist>
  <input id="tagsInput" type="text" placeholder="Tags, comma separated (e.g. mango, dessert)" list="tagList" autocomplete="off">
  <datalist id="tagList"></datalist>
  <input id="noteInput" type="text" placeholder="Note (optional)" autocomplete="off">
  <button id="addBtn">+ Add</button>
</section>
<p id="formError" class="form-error" hidden></p>

<nav id="categoryFilters" class="category-filters"></nav>
<nav id="tagFilters" class="category-filters tag-filters"></nav>

<main id="cardGrid" class="card-grid"></main>

<p id="emptyState" class="empty-state" hidden>No videos saved yet — paste a link above to get started.</p>

<!-- Instagram + TikTok embed scripts. Loaded async, so they can finish loading
     either before or after cards get rendered — reprocessEmbeds() is called both
     after every render() and again here once each script actually finishes
     loading, so a slow-loading script can't leave a card permanently blank. -->
<script async src="https://www.instagram.com/embed.js" onload="window.reprocessEmbeds && window.reprocessEmbeds()"></script>
<script async src="https://www.tiktok.com/embed.js" onload="window.reprocessEmbeds && window.reprocessEmbeds()"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js?v=4"></script>
</body>
</html>
